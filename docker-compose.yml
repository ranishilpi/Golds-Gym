services:
  mongo:
    image: mongo:latest
    container_name: fitness_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: fitness_app
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: